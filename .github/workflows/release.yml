name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,     target: aarch64-apple-darwin,        ext: "" }
          - { os: ubuntu-24.04, target: x86_64-unknown-linux-gnu,    ext: "" }
          - { os: windows-2022, target: x86_64-pc-windows-msvc,      ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/coord${{ matrix.ext }} \
             dist/coord-${{ matrix.target }}${{ matrix.ext }}
      - uses: actions/upload-artifact@v4
        with:
          name: coord-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            dist/SHA256SUMS
