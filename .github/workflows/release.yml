name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,     target: aarch64-apple-darwin,        ext: "" }
          - { os: ubuntu-24.04, target: x86_64-unknown-linux-gnu,    ext: "" }
          - { os: windows-2022, target: x86_64-pc-windows-msvc,      ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/coord${{ matrix.ext }} \
             dist/coord-${{ matrix.target }}${{ matrix.ext }}
      - uses: actions/upload-artifact@v4
        with:
          name: coord-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  update-tap:
    needs: publish
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TAP_DEPLOY_KEY }}
      - name: Update homebrew-coord tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git clone git@github.com:DmarshalTU/homebrew-coord.git tap
          ./scripts/release-formula.sh "$TAG" tap/Formula/coord.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/coord.rb
          if git diff --cached --quiet; then
            echo "no formula changes for $TAG"
            exit 0
          fi
          git commit -m "coord ${TAG#v}"
          git push origin main
